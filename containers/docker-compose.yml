# Local containers: use host ports 11000-11999 to avoid clashes with
# common services (postgres, redis, mysql, node, etc.)
# Nginx is the HTTPS entrypoint on 80/443; proxy to apps via shared network.

name: system-services

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "11900:9000"   # Edge agent tunnel (keep for remote agents)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    environment:
      - TZ=UTC
    networks:
      - app_net

  ###############################################
  #####      NETBIRD CONTAINERS     #############
  ###############################################
  
  dashboard:
    image: netbirdio/dashboard:latest
    container_name: netbird-dashboard
    restart: unless-stopped
    networks: [netbird]
    ports:
      - '127.0.0.1:8080:80'
    env_file:
      - ./netbird/dashboard.env
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  # Signal
  signal:
    image: netbirdio/signal:latest
    container_name: netbird-signal
    restart: unless-stopped
    networks: [netbird]
    ports:
      - '127.0.0.1:8083:80'
      - '127.0.0.1:10000:10000'
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  # Relay (includes embedded STUN server)
  relay:
    image: netbirdio/relay:latest
    container_name: netbird-relay
    restart: unless-stopped
    networks: [netbird]
    ports:
      - '127.0.0.1:8084:80'
      - '3478:3478/udp'
    env_file:
      - ./netbird/relay.env
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  # Management (includes embedded IdP)
  management:
    image: netbirdio/management:latest
    container_name: netbird-management
    restart: unless-stopped
    networks: [netbird]
    ports:
      - '127.0.0.1:8081:80'
    volumes:
      - netbird_management:/var/lib/netbird
      - ./netbird/management.json:/etc/netbird/management.json
    command: [
      "--port", "80",
      "--log-file", "console",
      "--log-level", "info",
      "--disable-anonymous-metrics=false",
      "--single-account-mode-domain=netbird.selfhosted",
      "--dns-domain=netbird.selfhosted",
      "--idp-sign-key-refresh-enabled",
    ]
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  routing:
    image: netbirdio/netbird:latest
    container_name: netbird-routing
    restart: unless-stopped
    networks: [app_net]
    cap_add:
      - NET_ADMIN
    env_file:
      - ./netbird/routing.env
    volumes:
      - netbird_client:/var/lib/netbird

  ###############################################
  ########      NEXT CLOUD      #################
  ###############################################

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "11904:80"
    env_file:
      - ./nextcloud/nextcloud.env
    volumes:
      - nextcloud_data:/var/www/html
      - nextcloud_storage:/var/www/html/data
    networks:
      - app_net
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  ###############################################
  ########      IMMICH      #####################
  ###############################################

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - immich_image_storage:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - ./immich/immich.env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://docs.immich.app/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - model-cache:/cache
    env_file:
      - ./immich/immich.env
    restart: always
    healthcheck:
      disable: false

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    env_file:
      - ./immich/immich.env
    environment:
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - immich_database_storage:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false

networks:
  app_net:
  netbird:

volumes:
  portainer_data:
  sandbox_mongo_data:
  sandbox_clickhouse_data:
  netbird_management:
  netbird_client:
  nextcloud_data:      
  nextcloud_storage:   
  immich_image_storage:
  immich_database_storage:
  model-cache:
